services:
    # --- AI Engine ---
    ollama:
        image: ollama/ollama:latest
        container_name: ollama
        restart: unless-stopped
        ports:
            - '${OLLAMA_PORT:-11434}:11434'
        volumes:
            - ollama_data:/root/.ollama
        gpus: all
        healthcheck:
            test: ['CMD', 'ollama', 'list']
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        networks:
            - ai-network

    # --- Auto Model Puller ---
    ollama-puller:
        image: curlimages/curl:latest
        container_name: ollama-puller
        depends_on:
            ollama:
                condition: service_healthy
        command: >
            sh -c "curl http://ollama:11434/api/pull -d '{\"name\": \"${MODEL:-qwen2.5:7b-instruct}\"}'"
        networks:
            - ai-network
        restart: 'no'

    # --- Web Interface (OpenClaw) ---
    openclaw:
        image: ghcr.io/openclaw/openclaw:latest
        container_name: openclaw
        restart: unless-stopped
        user: '0'
        ports:
            - '${OPENCLAW_PORT:-8080}:18789'
        environment:
            - GATEWAY_TOKEN=${GATEWAY_TOKEN}
            - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
            - GOOGLE_KEY=${GOOGLE_API_KEY}
            - MODEL_NAME=${MODEL}
        volumes:
            - ./openclaw.json:/root/.openclaw/openclaw.json
            - ./workspace:/root/.openclaw/workspace
        command: >
            sh -c "
            sed -i \"s/REPLACE_GATEWAY_TOKEN/$$GATEWAY_TOKEN/g\" /root/.openclaw/openclaw.json &&
            sed -i \"s|REPLACE_TELEGRAM_TOKEN|$$TELEGRAM_TOKEN|g\" /root/.openclaw/openclaw.json &&
            sed -i \"s/REPLACE_GOOGLE_KEY/$$GOOGLE_KEY/g\" /root/.openclaw/openclaw.json &&
            sed -i \"s/REPLACE_MODEL/$$MODEL_NAME/g\" /root/.openclaw/openclaw.json &&
            openclaw gateway --allow-unconfigured
            "
        depends_on:
            ollama:
                condition: service_healthy
        networks:
            - ai-network

    # --- Monitoring ---
    dozzle:
        image: amir20/dozzle:latest
        container_name: dozzle
        ports:
            - '${DOZZLE_PORT:-8888}:8080'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        restart: unless-stopped
        networks:
            - ai-network

volumes:
    ollama_data:
    openclaw_data:
    openclaw_config:

networks:
    ai-network:
        driver: bridge
