services:
    # --- AI Engine ---
    ollama:
        image: ollama/ollama:latest
        container_name: ollama
        restart: unless-stopped
        ports:
            - '${OLLAMA_PORT:-11434}:11434'
        volumes:
            - ollama_data:/root/.ollama
        gpus: all
        healthcheck:
            test: ['CMD', 'ollama', 'list']
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        networks:
            - ai-network

    # --- Auto Model Puller ---
    ollama-puller:
        image: curlimages/curl:latest
        container_name: ollama-puller
        depends_on:
            ollama:
                condition: service_healthy
        command: >
            sh -c "curl http://ollama:11434/api/pull -d '{\"name\": \"${MODEL:-qwen2.5:7b-instruct}\"}'"
        networks:
            - ai-network
        restart: 'no'

    # --- Web Interface (OpenClaw) ---
    openclaw:
        image: ghcr.io/openclaw/openclaw:latest
        container_name: openclaw
        restart: unless-stopped
        command: >
            sh -c "
            mkdir -p /root/.openclaw &&
            openclaw gateway --allow-unconfigured
            "
        user: '0'
        ports:
            - '${OPENCLAW_PORT:-18789}:18789'
        environment:
            - OLLAMA_BASE_URL=http://ollama:11434
            - ENABLE_AUTH=${ENABLE_AUTH:-false}
            - GATEWAY_AUTH_TOKEN=${GATEWAY_TOKEN:-123456789}
            - GATEWAY_CONTROLUI_ALLOWEDORIGINS=http://localhost:18789,http://127.0.0.1:18789
        volumes:
            - openclaw_data:/app/data
            - openclaw_config:/root/.openclaw
            - ./workspace:/root/.openclaw/workspace
        depends_on:
            ollama:
                condition: service_healthy
        networks:
            - ai-network

    # --- Monitoring ---
    dozzle:
        image: amir20/dozzle:latest
        container_name: dozzle
        ports:
            - '${DOZZLE_PORT:-8888}:8080'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        restart: unless-stopped
        networks:
            - ai-network

volumes:
    ollama_data:
    openclaw_data:
    openclaw_config:

networks:
    ai-network:
        driver: bridge
